<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sigma.GG Riot ID Search</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
    <h1>Search by Riot ID</h1>

    <div id="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
